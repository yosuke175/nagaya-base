# CLA Assistant Lite (contributor-assistant/github-action)
#
# On every PR, contributors who have not signed CLA.md get a comment asking
# for consent; replying with the exact phrase below records the signature in
# the `cla-signatures` branch (signatures/cla.json) and turns the check
# green (phase0-checklist Step 4 / CONTRIBUTING.md §0).
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/yosuke175/nagaya-base/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],*[bot]"
          custom-notsigned-prcomment: "ご参加ありがとうございます。マージの前に [CLA（貢献者許諾契約）](https://github.com/yosuke175/nagaya-base/blob/main/CLA.md) への同意が必要です。全文を読み、同意する場合は次の1行を**そのまま**この PR にコメントしてください:<br/><br/>**I have read the CLA Document and I hereby sign the CLA**"
          custom-allsigned-prcomment: "✅ 全員の CLA 同意を確認しました。ありがとうございます。"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 566" font-family="'Hiragino Sans','Yu Gothic UI',Meiryo,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b85042"/>
    </marker>
  </defs>
  <style>
    .box{fill:#f1eee3;stroke:#c9a15a;stroke-width:1.5;rx:12;}
    .num{fill:#b85042;font-size:15px;font-weight:700;}
    .ttl{fill:#1e2c4a;font-size:15px;font-weight:700;}
    .sub{fill:#6b6560;font-size:12px;}
    .arw{stroke:#b85042;stroke-width:2;marker-end:url(#arrow);}
    .tag{fill:#b85042;font-size:11px;font-weight:700;}
  </style>

  <rect class="box" x="20" y="14" width="440" height="60" rx="12"/>
  <text class="num" x="38" y="40">1</text>
  <text class="ttl" x="60" y="40">GitHub アカウントを作る</text>
  <text class="sub" x="60" y="60">無料。メールでコード認証まで済ませる</text>

  <line class="arw" x1="240" y1="76" x2="240" y2="98"/>

  <rect class="box" x="20" y="100" width="440" height="60" rx="12"/>
  <text class="num" x="38" y="126">2</text>
  <text class="ttl" x="60" y="126">本家から自分のGitHubにコピー（Fork）</text>
  <text class="sub" x="60" y="146">長屋の複製が、あなたのGitHubにできる</text>

  <line class="arw" x1="240" y1="162" x2="240" y2="184"/>

  <rect class="box" x="20" y="186" width="440" height="60" rx="12"/>
  <text class="num" x="38" y="212">3</text>
  <text class="ttl" x="60" y="212">クラウドの作業場で開く</text>
  <text class="sub" x="60" y="232">Codespaces / Claude Code 等。PCに何も入れない</text>

  <line class="arw" x1="240" y1="248" x2="240" y2="270"/>

  <rect class="box" x="20" y="272" width="440" height="60" rx="12"/>
  <text class="num" x="38" y="298">4</text>
  <text class="ttl" x="60" y="298">AIと作る → GitHubに push</text>
  <text class="sub" x="60" y="318">指示文は工房「新しい道具をつくる」から</text>

  <line class="arw" x1="240" y1="334" x2="240" y2="356"/>

  <rect class="box" x="20" y="358" width="440" height="60" rx="12"/>
  <text class="num" x="38" y="384">5</text>
  <text class="ttl" x="60" y="384">工房「部屋で試運転」で確認</text>
  <text class="sub" x="60" y="404">自分の部屋で動かす。まだ公開はされない</text>

  <line class="arw" x1="240" y1="420" x2="240" y2="442"/>

  <rect class="box" x="20" y="444" width="440" height="60" rx="12" fill="#eef2ee" stroke="#6e8f7c"/>
  <text class="num" x="38" y="470" fill="#6e8f7c">6</text>
  <text class="ttl" x="60" y="470">PRを出す → 道具市に公開</text>
  <text class="sub" x="60" y="490">「これ入れて」の申請 → マージ → 公開ボタン</text>

  <text class="tag" x="240" y="534" text-anchor="middle">※ 大家（本家の持ち主）は 2 のForkは不要（本家で直接つくる）</text>
</svg>

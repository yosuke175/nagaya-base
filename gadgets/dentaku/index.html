<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <!-- Gadgets are shown on phones too — keep this viewport tag (gadget-spec.md §7) -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ガジェット雛形</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: #1c1917;
      }
      body {
        margin: 0;
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      #status {
        font-size: 12px;
        color: #57534e;
        margin: 0 0 12px;
      }
      #status.error {
        color: #b91c1c;
      }
      button {
        font-size: 14px;
        padding: 6px 16px;
        border: 1px solid #a8a29e;
        border-radius: 8px;
        background: #fafaf9;
        cursor: pointer;
      }
      button:hover {
        background: #f5f5f4;
      }
      .count {
        font-size: 24px;
        font-weight: 700;
      }
      .hint {
        font-size: 11px;
        color: #78716c;
      }
    </style>
  </head>
  <body>
    <h1>ガジェット雛形</h1>
    <p id="status">プラットフォームに接続中…</p>
    <div id="demo" hidden>
      <p>保存済みカウント: <span id="count" class="count">-</span></p>
      <button id="increment" type="button">+1 して保存</button>
      <p class="hint">値は gadget.storage に保存されます（このガジェット × あなた専用の領域）。</p>
    </div>

    <script type="module">
      // The SDK is the ONLY way to talk to the platform (gadget-spec.md §4).
      import { createGadget } from "/sdk/gadget-sdk.js";

      const statusEl = document.getElementById("status");
      const demoEl = document.getElementById("demo");
      const countEl = document.getElementById("count");
      const buttonEl = document.getElementById("increment");

      async function main() {
        // Handshake with the platform (rejects after 10s)
        const gadget = await createGadget();
        statusEl.textContent = "接続OK（ハンドシェイク成功）";
        demoEl.hidden = false;

        // Requires "storage" in manifest.json permissions
        let count = (await gadget.storage.get("count")) ?? 0;
        countEl.textContent = String(count);

        buttonEl.addEventListener("click", async () => {
          count += 1;
          await gadget.storage.set("count", count);
          countEl.textContent = String(count);
        });
      }

      main().catch((error) => {
        statusEl.textContent = `接続に失敗しました: ${error.message}`;
        statusEl.classList.add("error");
      });
    </script>
  </body>
</html>
